project:
  name: "LLM Serving Benchmark Framework for Clinical NLP Workloads"
  seed: 42

workload:
  mode: "mixed_clinical"
  acl_dataset_path: "data/data acl"
  blue_dataset_path: "data/blue_data"
  tokenizer_name: "distilgpt2"
  mix:
    pubhealth: 0.35
    mimic_bhc: 0.35
    blue: 0.30
  cost_model:
    input_weight: 1.0
    output_weight: 1.4
    kv_cache_weight: 0.25
    task_weights:
      question_answering: 0.9
      information_extraction: 1.1
      summarization: 1.4
  num_requests: 60

experiments:
  concurrency_levels: [1]
  request_rates: [0.5]
  batch_sizes: [1]
  trials: 1
  cost_per_1m_tokens: null

scheduler:
  policy: "service_class_priority"
  input_weight: 1.0
  output_weight: 1.0
  task_priorities:
    interactive: 0
    verification: 1
    standard: 2
    standard_generation: 3
    batch_long_context: 4
    background: 5

engines:
  default_kwargs:
    temperature: 0.0
  backends:
    - name: "vllm"
      enabled: true
      model: "Qwen/Qwen2.5-7B-Instruct"
      base_url: "http://127.0.0.1:8000"
    - name: "tgi"
      enabled: false
      model: "Qwen/Qwen2.5-7B-Instruct"
      base_url: "http://localhost:8080"
    - name: "hf_transformers"
      enabled: false
      model: "Qwen/Qwen2.5-7B-Instruct"
      device: "cuda"
      torch_dtype: "auto"

results:
  output_dir: "results/remote_mixed_clinical_vllm_service_class_60_qwen25_7b"
  request_csv: "results/remote_mixed_clinical_vllm_service_class_60_qwen25_7b/request_metrics.csv"
  request_json: "results/remote_mixed_clinical_vllm_service_class_60_qwen25_7b/request_metrics.json"
  summary_csv: "results/remote_mixed_clinical_vllm_service_class_60_qwen25_7b/summary_metrics.csv"
  summary_json: "results/remote_mixed_clinical_vllm_service_class_60_qwen25_7b/summary_metrics.json"
  gpu_csv: "results/remote_mixed_clinical_vllm_service_class_60_qwen25_7b/gpu_metrics.csv"
  plots_dir: "results/remote_mixed_clinical_vllm_service_class_60_qwen25_7b/plots"

gpu_monitor:
  enabled: true
  poll_interval: 1.0
