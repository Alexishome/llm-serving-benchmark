project:
  name: "LLM Serving Benchmark Framework for Clinical NLP Workloads"
  seed: 42

workload:
  mode: "leval"
  dataset_path: "data/leval"
  tokenizer_name: "distilgpt2"
  cost_model:
    input_weight: 1.0
    output_weight: 1.4
    kv_cache_weight: 0.2
    task_weights:
      question_answering: 1.0
      summarization: 1.2
      information_extraction: 1.0
  num_requests: 100

experiments:
  concurrency_levels: [1, 4, 8]
  request_rates: [0.5, 1.0]
  batch_sizes: [1]
  trials: 2
  cost_per_1m_tokens: null

scheduler:
  policy: "predicted_cost_first"
  input_weight: 1.0
  output_weight: 1.0
  task_priorities:
    question_answering: 1
    summarization: 2
    information_extraction: 2

engines:
  default_kwargs:
    temperature: 0.0
  backends:
    - name: "vllm"
      enabled: true
      model: "Qwen/Qwen2.5-1.5B-Instruct"
      base_url: "http://localhost:8000"
    - name: "tgi"
      enabled: false
      model: "Qwen/Qwen2.5-1.5B-Instruct"
      base_url: "http://localhost:8080"
    - name: "hf_transformers"
      enabled: false
      model: "distilgpt2"
      device: "cpu"

results:
  output_dir: "results/leval"
  request_csv: "results/leval/request_metrics.csv"
  request_json: "results/leval/request_metrics.json"
  summary_csv: "results/leval/summary_metrics.csv"
  summary_json: "results/leval/summary_metrics.json"
  gpu_csv: "results/leval/gpu_metrics.csv"
  plots_dir: "results/leval/plots"

gpu_monitor:
  enabled: true
  poll_interval: 1.0
