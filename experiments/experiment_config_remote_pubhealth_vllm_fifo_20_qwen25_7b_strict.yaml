project:
  name: "LLM Serving Benchmark Framework for Clinical NLP Workloads"
  seed: 42

workload:
  mode: "pubhealth"
  dataset_path: "data/data acl"
  tokenizer_name: "distilgpt2"
  cost_model:
    input_weight: 1.0
    output_weight: 1.1
    kv_cache_weight: 0.1
    task_weights:
      question_answering: 1.0
      information_extraction: 1.0
      summarization: 1.0
  num_requests: 20

experiments:
  concurrency_levels: [1]
  request_rates: [0.5]
  batch_sizes: [1]
  trials: 1
  cost_per_1m_tokens: null

scheduler:
  policy: "fifo"
  input_weight: 1.0
  output_weight: 1.0
  task_priorities:
    question_answering: 1
    information_extraction: 2
    summarization: 2

engines:
  default_kwargs:
    temperature: 0.0
    max_tokens: 4
  backends:
    - name: "vllm"
      enabled: true
      model: "Qwen/Qwen2.5-7B-Instruct"
      base_url: "http://127.0.0.1:8000"
    - name: "tgi"
      enabled: false
      model: "Qwen/Qwen2.5-7B-Instruct"
      base_url: "http://localhost:8080"
    - name: "hf_transformers"
      enabled: false
      model: "Qwen/Qwen2.5-7B-Instruct"
      device: "cuda"
      torch_dtype: "auto"

results:
  output_dir: "results/remote_pubhealth_vllm_fifo_20_qwen25_7b_strict"
  request_csv: "results/remote_pubhealth_vllm_fifo_20_qwen25_7b_strict/request_metrics.csv"
  request_json: "results/remote_pubhealth_vllm_fifo_20_qwen25_7b_strict/request_metrics.json"
  summary_csv: "results/remote_pubhealth_vllm_fifo_20_qwen25_7b_strict/summary_metrics.csv"
  summary_json: "results/remote_pubhealth_vllm_fifo_20_qwen25_7b_strict/summary_metrics.json"
  gpu_csv: "results/remote_pubhealth_vllm_fifo_20_qwen25_7b_strict/gpu_metrics.csv"
  plots_dir: "results/remote_pubhealth_vllm_fifo_20_qwen25_7b_strict/plots"

gpu_monitor:
  enabled: true
  poll_interval: 1.0
